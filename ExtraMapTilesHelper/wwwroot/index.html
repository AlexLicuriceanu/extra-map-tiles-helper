<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Editor Setup</title>
    <style>
        body {
            font-family: sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #89b4fa;
            border: none;
            border-radius: 5px;
            color: #1e1e2e;
            font-weight: bold;
        }

        #log {
            margin-top: 20px;
            font-family: monospace;
            color: #a6e3a1;
        }
    </style>
</head>
<body>
    <div style="padding: 20px;">
        <h1>Map Tile Editor</h1>
        <button id="importBtn">Import .ytd File</button>
        <p id="status">Waiting for file...</p>

        <div id="textureGallery" style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px;"></div>
    </div>

    <script src="bridge.js"></script>
    <script>
        const statusEl = document.getElementById("status");
        const galleryEl = document.getElementById("textureGallery");

        // 1. Tell C# to open the file picker
        document.getElementById("importBtn").addEventListener("click", () => {
        statusEl.innerText = "Opening file picker...";
        Bridge.send("open_file_dialog");
        });

        // 2. Listen for the extracted data from C#
        Bridge.on("ytd_loaded", (payload) => {
        statusEl.innerText = `Loaded dictionary: ${payload.dictionaryName} (${payload.textures.length} textures)`;

        // Clear the gallery
        galleryEl.innerHTML = "";

        // Render each texture
        payload.textures.forEach(tex => {
        const imgContainer = document.createElement("div");
        imgContainer.style.background = "#313244";
        imgContainer.style.padding = "10px";
        imgContainer.style.borderRadius = "8px";

        const img = document.createElement("img");
        img.src = tex.preview;
        img.style.width = "128px";
        img.style.height = "128px";
        img.style.objectFit = "contain";
        img.style.display = "block";

        const label = document.createElement("small");
        label.innerText = tex.name;
        label.style.display = "block";
        label.style.marginTop = "5px";
        label.style.textAlign = "center";

        imgContainer.appendChild(img);
        imgContainer.appendChild(label);
        galleryEl.appendChild(imgContainer);
        });
        });

        Bridge.on("error", (payload) => {
        statusEl.innerText = `Error: ${payload.message}`;
        statusEl.style.color = "#f38ba8";
        });
    </script>
</body>
</html>
