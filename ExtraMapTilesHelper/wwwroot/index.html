<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Extra Map Tiles Helper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", system-ui, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 1.5rem;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }

        #status {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            background: #313244;
            font-size: 0.95rem;
            min-width: 300px;
            text-align: center;
        }

            #status.success {
                border-left: 4px solid #a6e3a1;
            }

            #status.error {
                border-left: 4px solid #f38ba8;
            }

        button {
            padding: 0.6rem 1.4rem;
            border: none;
            border-radius: 6px;
            background: #89b4fa;
            color: #1e1e2e;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

            button:hover {
                background: #74c7ec;
            }
    </style>
</head>
<body>
    <h1>Extra Map Tiles Helper</h1>
    <div id="status">Waiting for ping...</div>
    <button id="pingBtn">Ping Backend</button>

    <script src="js/bridge.js"></script>
    <script>
        const statusEl = document.getElementById("status");
        const pingBtn = document.getElementById("pingBtn");

        Bridge.on("pong", (payload) => {
        statusEl.textContent = payload.message;
        statusEl.className = "success";
        });

        Bridge.on("error", (payload) => {
        statusEl.textContent = `Error: ${payload.message}`;
        statusEl.className = "error";
        });

        pingBtn.addEventListener("click", () => {
        statusEl.textContent = "Pinging…";
        statusEl.className = "";
        Bridge.send("ping");
        });
    </script>
</body>
</html>
